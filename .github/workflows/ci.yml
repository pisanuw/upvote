name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Build-only placeholders. All data routes are dynamic, so no real database
    # or Supabase connection happens during `next build`; these values only
    # satisfy fail-closed env checks at module load (e.g. src/lib/prisma.ts
    # throws if DATABASE_URL is unset). Unit tests mock prisma and ignore these.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      AUTH_SECRET: ci-build-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
      SUPABASE_URL: https://ci.example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-build-placeholder-key
      SUPABASE_STORAGE_BUCKET: ci-bucket

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
